name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Github Action'
        uses: actions/checkout@v4

      - name: 'Login to Azure Container Registry'
        uses: azure/docker-login@v2
        with:
          login-server: healthmonitorreg.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: 'Build and Push AMD64 Image'
        run: |
          docker build --platform linux/amd64 -t healthmonitorreg.azurecr.io/health-monitor-app:${{ github.sha }} .
          docker push healthmonitorreg.azurecr.io/health-monitor-app:${{ github.sha }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'health-monitor-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'healthmonitorreg.azurecr.io/health-monitor-app:${{ github.sha }}'
